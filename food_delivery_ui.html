<!DOCTYPE html>
<html>
<head>
<title>Food Delivery App</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#ff5a5f;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.restaurant{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.restaurant h3{
margin:0;
}

.order-btn{
background:#ff5a5f;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
Food Delivery
</div>

<div class="search">
<input type="text" placeholder="Search food or restaurant">
</div>

<div class="restaurant">
<h3>Pizza Palace</h3>
<p>Delicious Italian Pizza</p>
<button class="order-btn">Order Now</button>
</div>

<div class="restaurant">
<h3>Burger Hub</h3>
<p>Best Burgers in Town</p>
<button class="order-btn">Order Now</button>
</div>

<div class="restaurant">
<h3>Biryani House</h3>
<p>Authentic Hyderabadi Biryani</p>
<button class="order-btn">Order Now</button>
</div>

</body>
</html>
